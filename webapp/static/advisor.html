<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TiefBench · Fit Advisor</title>
<style>
  :root{--bg:#0b0e14;--bg2:#0f131c;--panel:#141925;--line:#242c3d;--txt:#e8ebf2;--mut:#8a93a8;
        --accent:#7aa2ff;--accent2:#a78bfa;--green:#34d399;--amber:#fbbf24;--red:#f87171;
        --shadow:0 8px 30px rgba(0,0,0,.35)}
  *{box-sizing:border-box} body{margin:0;font:14px/1.55 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Inter,sans-serif;
    background:radial-gradient(1200px 600px at 80% -10%,#16203a 0%,var(--bg) 55%);color:var(--txt);min-height:100vh}
  header{display:flex;align-items:center;gap:16px;padding:12px 22px;border-bottom:1px solid var(--line);
    background:rgba(10,13,20,.6);backdrop-filter:blur(8px);position:sticky;top:0;z-index:5}
  .brand{display:flex;align-items:center;gap:10px;font-weight:700}
  .brand .dot{width:10px;height:10px;border-radius:50%;background:linear-gradient(135deg,var(--accent),var(--accent2));box-shadow:0 0 12px var(--accent)}
  .brand small{color:var(--mut);font-weight:500}
  header .spacer{flex:1}
  a.back,.srcbtn{font-size:13px;color:var(--txt);background:var(--panel);border:1px solid var(--line);
    border-radius:10px;padding:8px 13px;text-decoration:none;cursor:pointer}
  a.back:hover,.srcbtn:hover{border-color:var(--accent)}
  .srcbtn.active{border-color:var(--accent);color:var(--accent)}
  main{max-width:1040px;margin:0 auto;padding:22px}
  .reco{display:flex;align-items:center;gap:14px;padding:16px 18px;border-radius:14px;margin-bottom:18px;
    background:linear-gradient(180deg,#13251c,#141a28);border:1px solid #1e5a44;box-shadow:var(--shadow)}
  .reco .big{font-size:20px;font-weight:800}
  .reco .sub{color:var(--mut);font-size:13px}
  .reco .tick{font-size:30px}
  h3.sec{font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--mut);margin:22px 2px 10px}
  .chips{display:flex;gap:8px;flex-wrap:wrap}
  .chip{font-size:12px;background:var(--panel);border:1px solid var(--line);border-radius:20px;padding:6px 12px;color:var(--mut)}
  .chip b{color:var(--txt)} .chip.warn{border-color:var(--amber);color:var(--amber)}
  .whatif{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:16px 18px;margin:10px 0}
  .whatif .row{display:flex;align-items:center;gap:14px}
  .whatif input[type=range]{flex:1;accent-color:var(--accent)}
  .whatif .val{font-weight:700;min-width:120px}
  .whatif .hint{color:var(--mut);font-size:12px;margin-top:8px}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:14px;box-shadow:var(--shadow)}
  .card.green{border-left:4px solid var(--green)} .card.amber{border-left:4px solid var(--amber)} .card.red{border-left:4px solid var(--red)}
  .card.reco-card{box-shadow:0 0 0 1px var(--green),var(--shadow)}
  .card h4{margin:0 0 4px;display:flex;align-items:center;gap:8px;font-size:15px}
  .light{width:12px;height:12px;border-radius:50%}
  .light.green{background:var(--green)} .light.amber{background:var(--amber)} .light.red{background:var(--red)}
  .verdict{font-size:13px;color:var(--mut);margin-bottom:8px}
  .verdict.green{color:var(--green)} .verdict.amber{color:var(--amber)} .verdict.red{color:var(--red)}
  .costchip{float:right;font-size:11px;color:var(--mut);background:var(--bg);border:1px solid var(--line);border-radius:8px;padding:2px 8px}
  details{margin-top:8px} summary{cursor:pointer;color:var(--accent);font-size:12px}
  ul{margin:6px 0 0;padding-left:18px;font-size:13px;color:var(--mut)} ul.fix li{color:var(--txt)}
  .recpill{font-size:10px;font-weight:800;background:#13251c;color:var(--green);border:1px solid #1e5a44;border-radius:6px;padding:2px 7px}
  input[type=file]{display:none}
  .measured{margin-top:8px;font-size:12px;color:var(--mut);background:#0d1119;border:1px solid var(--line);border-radius:8px;padding:6px 9px}
  .measured b{color:var(--green)}
</style>
</head>
<body>
<header>
  <div class="brand"><span class="dot"></span> TiefBench <small>· Fit Advisor</small></div>
  <div class="spacer"></div>
  <button class="srcbtn active" id="srcBuiltin">TiefStocks pack</button>
  <label class="srcbtn" for="packFile">Upload TiefWise pack</label>
  <input type="file" id="packFile" accept=".json">
  <a class="back" href="/">← Bake-off</a>
</header>

<main>
  <div class="reco" id="reco"><div class="tick">⏳</div><div><div class="big">Analyzing…</div></div></div>

  <h3 class="sec">Your pack at a glance</h3>
  <div class="chips" id="signals"></div>

  <div class="whatif">
    <div class="row">
      <span class="val" id="simVal">Tools: —</span>
      <input type="range" id="sim" min="1" max="80" value="8">
    </div>
    <div class="hint">Drag to simulate a bigger pack and watch the fit change. This is the “too many tools” cliff — see when MCP / function calling turn red and the recommendation switches.</div>
  </div>

  <h3 class="sec">How each approach will handle this pack</h3>
  <div class="grid" id="cards"></div>
</main>

<script>
const $=s=>document.querySelector(s);
let pack=null, simN=null, realN=8;

async function load(){
  const body={pack:pack, simulate_n:simN};
  let d;
  try{ d=await (await fetch('/api/fit',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)})).json(); }
  catch(e){ $('#reco').innerHTML='<div class="tick">⚠️</div><div><div class="big">Could not analyze</div></div>'; return; }
  if(d.error){ $('#reco').innerHTML=`<div class="tick">⚠️</div><div><div class="big">${d.error}</div></div>`; return; }
  render(d);
}

function render(d){
  realN = d.real_n;
  const s=d.signals;
  const simNote = d.simulated ? ` <span class="recpill">SIMULATED ${s.n_tools} tools</span>` : '';
  const cal=d.calibration;
  const calNote = (cal && cal.runs)
    ? `<span class="recpill" style="background:#1a2236;color:var(--accent);border-color:#2c3a5e">📊 calibrated from ${cal.runs} runs${cal.model?` · ${cal.model}`:''}</span>`
    : `<span class="recpill" style="background:#2a230e;color:var(--amber);border-color:#5a4a1e">estimates only — run a bake-off to calibrate</span>`;
  $('#reco').innerHTML=`<div class="tick">✅</div><div>
    <div class="big">Best fit: ${d.recommended_label}${simNote}</div>
    <div class="sub">Recommended for a pack of ${s.n_tools} tools · ${s.path_groups} domain group(s) · ${s.writes} write(s)/${s.destructive} destructive. ${calNote}</div></div>`;

  const warnTok = s.schema_tokens>7000, warnN=s.n_tools>25;
  $('#signals').innerHTML=`
    <span class="chip ${warnN?'warn':''}"><b>${s.n_tools}</b> tools</span>
    <span class="chip ${warnTok?'warn':''}"><b>~${s.schema_tokens.toLocaleString()}</b> schema tokens/call</span>
    <span class="chip"><b>${s.path_groups}</b> domain groups</span>
    <span class="chip ${s.destructive?'warn':''}"><b>${s.writes}</b> write · <b>${s.destructive}</b> destructive</span>
    <span class="chip"><b>${s.avg_params}</b> avg params</span>
    <span class="chip ${s.desc_quality<0.6?'warn':''}"><b>${Math.round(s.desc_quality*100)}%</b> well-described</span>`;

  // keep slider in sync with real pack size on (re)load of a new pack
  const sl=$('#sim');
  if(!d.simulated){ sl.value=realN; sl.min=Math.max(1,Math.min(realN,4)); $('#simVal').textContent=`Tools: ${realN} (actual)`; }
  else { $('#simVal').textContent=`Tools: ${s.n_tools} (what-if)`; }

  $('#cards').innerHTML=d.options.map(o=>{
    const isRec=o.key===d.recommended;
    const cost = o.measured_cost!=null
      ? `<span class="costchip" title="measured from real runs">$${o.measured_cost}/query · measured</span>`
      : `<span class="costchip">~$${o.est_cost}/query · est</span>`;
    const ob=o.observed;
    const measured = (ob && ob.runs) ? `<div class="measured">📊 measured (n=${ob.runs}):
        ${ob.acc!=null?`acc <b>${ob.acc}</b> · `:''}${ob.success_rate!=null?`<b>${ob.success_rate}%</b> success · `:''}
        <b>${ob.tok_in}/${ob.tok_out}</b> tok · <b>${ob.latency}s</b></div>` : '';
    return `<div class="card ${o.badge} ${isRec?'reco-card':''}">
      <h4><span class="light ${o.badge}"></span> Option ${o.key.toUpperCase()} — ${o.label}
        ${isRec?'<span class="recpill">RECOMMENDED</span>':''}
        ${cost}</h4>
      <div class="verdict ${o.badge}">${o.badge==='green'?'Good fit':o.badge==='amber'?'Works, with caveats':'Likely to underperform'}</div>
      <div style="font-size:13px">${o.reasons[0]}</div>
      ${measured}
      <details><summary>why & how to improve</summary>
        <ul>${o.reasons.slice(1).map(r=>`<li>${r}</li>`).join('')}</ul>
        <div style="color:var(--mut);font-size:11px;margin-top:8px;text-transform:uppercase;letter-spacing:.05em">mitigations</div>
        <ul class="fix">${o.mitigations.map(m=>`<li>${m}</li>`).join('')}</ul>
      </details></div>`;
  }).join('');
}

// what-if slider (debounced)
let t=null;
$('#sim').addEventListener('input',e=>{
  const v=+e.target.value; $('#simVal').textContent=`Tools: ${v}${v===realN?' (actual)':' (what-if)'}`;
  simN = (v===realN)?null:v;
  clearTimeout(t); t=setTimeout(load,150);
});
$('#srcBuiltin').onclick=()=>{ pack=null; simN=null; $('#srcBuiltin').classList.add('active'); load(); };
$('#packFile').addEventListener('change',async e=>{
  const f=e.target.files[0]; if(!f) return;
  try{ pack=JSON.parse(await f.text()); simN=null; $('#srcBuiltin').classList.remove('active'); load(); }
  catch(err){ alert('Not valid JSON: '+err); }
});

load();
</script>
</body>
</html>
